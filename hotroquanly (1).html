  <script>
    (function() {
      const firebaseConfig = {

        authDomain: "hotroquanly.firebaseapp.com",
        projectId : "hotroquanly",
      };
      try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Lưu dữ liệu — mỗi user 1 doc riêng: appdata/{username}
        window._fsSave = async (dataObj, username) => {
          if (!username) return false;
          try {
            window._fsSaveStatus && window._fsSaveStatus('saving');
            await db.collection('appdata').doc(username).set(dataObj);
            window._fsSaveStatus && window._fsSaveStatus('saved');
            return true;
          } catch(e) {
            console.warn('Firestore save error:', e.message);
            window._fsSaveStatus && window._fsSaveStatus('error');
            return false;
          }
        };

        // Đọc dữ liệu — doc của user đang đăng nhập
        window._fsLoad = async (username) => {
          if (!username) return null;
          try {
            const snap = await db.collection('appdata').doc(username).get();
            return snap.exists ? snap.data() : null;
          } catch(e) {
            console.warn('Firestore load error:', e.message);
            return null;
          }
        };

        window._fsReady = true;
      } catch(e) {
        console.warn('Firebase init error:', e.message);

    <!-- Màn hình Đăng nhập -->

        // ============ CẤU HÌNH FIREBASE AUTH ============
        // THAY 3 giá trị này bằng config Firebase project của bạn
        const FB_API_KEY   = 'AIzaSyBKxHviYNz4cLPK2A-7rvWDHBnUTGyfTFw';
        const FB_PROJECT   = 'hotroquanly';
        const TOKEN_KEY    = 'app_auth_token';
        const USER_KEY     = 'app_auth_user';
        let dangXuLyLogin  = false;

        // Danh sách tài khoản được phép (email Firebase tương ứng)
        // Format: username -> email Firebase
        const USER_MAP = {
            'thaild': 'thaild@app.local',
            'linhnt': 'linhnt@app.local',
            'anhld' : 'anhld@app.local'
        };

        // Đăng nhập qua Firebase REST API (không bị CORS, không cần SDK)
        async function callFirebaseLogin(email, password) {
            try {
                const res = await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, returnSecureToken: true })
                    }
                );
                const data = await res.json();
                if (data.error) {
                    console.error('Firebase error:', data.error);
                    return { ok: false, error: 'Tên đăng nhập hoặc mật khẩu không đúng' };
                }
                // Lưu cả refreshToken để gia hạn idToken sau 1 giờ
                return { ok: true, token: data.idToken, refreshToken: data.refreshToken };
            } catch (e) {
                console.error('Login fetch error:', e);
                return { ok: false, error: 'Không kết nối được máy chủ' };
            }
        }

        // Gia hạn idToken bằng refreshToken (Firebase idToken hết hạn sau 1h)
        async function refreshIdToken(refreshToken) {
            try {
                const res = await fetch(
                    `https://securetoken.googleapis.com/v1/token?key=${FB_API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ grant_type: 'refresh_token', refresh_token: refreshToken })
                    }
                );
                const data = await res.json();
                if (data.error) return null;
                return data.id_token;
            } catch { return null; }
        }

        function showApp() {

        // Hiển thị màn hình đăng nhập
        function showLogin() {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            mainApp.classList.add('hidden');
            loginScreen.classList.remove('opacity-0');
            loginScreen.style.opacity = '1';
            loginScreen.style.display = 'flex';
        }

        // --- LOGIC ĐĂNG NHẬP ---
        async function handleLogin() {
            if (dangXuLyLogin) return;
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!user || !pass) { showError('Vui lòng nhập đủ Tên và Mật khẩu'); return; }

            // Kiểm tra username có trong danh sách không
            const email = USER_MAP[user];
            if (!email) { showError('Tên đăng nhập hoặc mật khẩu không đúng'); return; }

            dangXuLyLogin = true;
            const btn = document.querySelector('button[onclick="handleLogin()"]');
            const oldText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Đang xử lý...';

            const result = await callFirebaseLogin(email, pass);

            dangXuLyLogin = false;
            btn.disabled = false;
            btn.innerText = oldText;

            if (!result.ok) { showError(result.error); return; }

            localStorage.setItem(TOKEN_KEY, result.token);
            if (result.refreshToken) localStorage.setItem('app_refresh_token', result.refreshToken);
            localStorage.setItem(USER_KEY, user);
            showApp();
        }

        // --- LOGIC THOÁT ---
        function handleLogout() {
            if (!confirm('Bạn muốn thoát tài khoản?')) return;
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            localStorage.removeItem('app_refresh_token');
            showLogin();
        }

        // --- KIỂM TRA PHIÊN KHI MỞ APP ---
        async function kiemTraPhien() {
            const refreshToken = localStorage.getItem('app_refresh_token');
            if (!refreshToken) return false;
            // Dùng refreshToken để lấy idToken mới (không bị lỗi domain, không hết hạn)
            const newToken = await refreshIdToken(refreshToken);
            if (!newToken) {
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem('app_refresh_token');
                return false;
            }
            localStorage.setItem(TOKEN_KEY, newToken);
            return true;
        }

        // --- STUB TAG (chưa có logic) ---

            // Xác định tab của card
            const col = card.closest('.column-content');
            const tabId = col ? parseInt(col.id.replace('container-', '')) : currentActiveTab;
            const availTags = tagsConfig[tabId] || [];

            // Tag hiện tại của card
            const currentTags = Array.from(card.querySelectorAll('.tags-container .tag-badge')).map(t => t.dataset.tag);

            // Render danh sách tag

            } else {
                list.innerHTML = availTags.map(t => {

                    return `<button onclick="toggleTagOnCard('${cardId}','${t.text}','${t.color}',this)" class="tag-option-btn py-2 px-3 rounded-xl text-[11px] font-bold border transition-all ${activeClass}" data-tag="${t.text}" data-active="${isActive}">${t.text}</button>`;

        function toggleTagOnCard(cardId, tagText, tagColor, btn) {
            const card = document.getElementById(cardId);
            if (!card) return;
            const container = card.querySelector('.tags-container');
            const isActive = btn.dataset.active === 'true';
            const col = getTagColor(tagText);
            if (isActive) {
                const existing = Array.from(container.querySelectorAll('.tag-badge')).find(t => t.dataset.tag === tagText);

            { bg: 'bg-indigo-100', text: 'text-indigo-600', border: 'border-indigo-200' },

            if (!tagColorCache[tagText]) {
                // Hash tên tag để chọn màu nhất quán
                let hash = 0;
                for (let c of tagText) hash = (hash * 31 + c.charCodeAt(0)) % TAG_COLOR_PALETTE.length;
                tagColorCache[tagText] = TAG_COLOR_PALETTE[hash];
            }
            return tagColorCache[tagText];

        function validateDateInput(dateStr) {
            if (!dateStr || dateStr.trim() === '') return true; 
            const regex = /^(\d{1,2})\.(\d{1,2})$/;
            const match = dateStr.match(regex);
            if (!match) { showError("Ngày dò sai định dạng. Vui lòng nhập ví dụ: 20.10"); return false; }
            const day = parseInt(match[1]); const month = parseInt(match[2]);
            if (month < 1 || month > 12) { showError("Tháng không hợp lệ (1-12)"); return false; }
            const now = new Date(); const year = now.getFullYear();
            const daysInMonth = new Date(year, month, 0).getDate();
            if (day < 1 || day > daysInMonth) { showError(`Tháng ${month} chỉ có ${daysInMonth} ngày`); return false; }
            const inputDate = new Date(year, month - 1, day); const today = new Date(); today.setHours(0, 0, 0, 0);
            if (inputDate < today) { showError("Ngày dò không được là ngày trong quá khứ"); return false; }
            return true;
        }

        function getTodayFormatted() {
            const now = new Date();
            return `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
        function getTimeFormatted() {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}.${String(now.getMinutes()).padStart(2, '0')} ${getTodayFormatted()}`;
        }

        function addCardLog(cardId, action) {
            const realId = cardId.replace('remind-', '');
            if (!cardLogs[realId]) cardLogs[realId] = [];
            cardLogs[realId].unshift(`${localStorage.getItem("app_auth_user") || "admin"} - ${action} - ${getTimeFormatted()}`);
        }

        function parseDateString(dateStr) {
            if (!dateStr || dateStr.trim() === '') return new Date(9999, 0, 1);
            const parts = dateStr.split('.');
            if(parts.length < 2) return new Date(9999, 0, 1);
            return new Date(new Date().getFullYear(), parseInt(parts[1]) - 1, parseInt(parts[0]));
        }

        function sortCardsInContainer(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const cards = Array.from(container.querySelectorAll('.card'));
            cards.sort((a, b) => parseDateString(a.querySelector('.start-date')?.innerText) - parseDateString(b.querySelector('.start-date')?.innerText));
            cards.forEach(card => container.appendChild(card));
        }

        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('tab-active', btn.dataset.tab == tabId);
                btn.classList.toggle('text-pastel-subtext', btn.dataset.tab != tabId);
            });
            document.querySelectorAll('.column-content').forEach(c => c.classList.toggle('active', c.id === `container-${tabId}`));
            if (tabId === 0) updateReminders();
            else sortCardsInContainer(`container-${tabId}`);
        }

        function handleGlobalCreate() {
            const targetTab = currentActiveTab === 0 ? 1 : currentActiveTab;
            if (currentActiveTab === 0) switchTab(1);
            createNewCard(targetTab);
        }

            const id = 'card-' + Date.now();
            lastCreatedCardId = id;

                <div class="card bg-white rounded-[32px] p-5 shadow-sm border border-pastel-border relative" id="${id}">

                            <span class="card-num w-5 h-5 rounded-full bg-rose-100 text-rose-500 text-[9px] font-black flex items-center justify-center shrink-0">?</span>
                            <div class="w-9 h-9 rounded-full bg-pastel-pink/10 flex items-center justify-center shrink-0"><i class="ph-fill ph-user text-pastel-pink text-lg"></i></div>
                            <span class="font-bold text-[15px] uppercase tracking-wide customer-name truncate max-w-[120px]">MỚI</span>
                        </div>
                        <div class="card-btns flex items-center gap-1.5">
                            <button onclick="openCardEditModal('${id}')" class="btn-edit-card text-[10px] font-black text-pastel-subtext bg-pastel-bg px-2.5 py-1.5 rounded-full border border-pastel-border">Sửa thẻ</button>
                            <button onclick="openDoctorModal('${id}')" id="doctor-btn-${id}" class="btn-doctor-reply text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full flex items-center gap-1 border border-indigo-100">Bác sĩ phản hồi</button>
                        </div>
                    </div>
                    <div class="text-[13.5px] text-pastel-text/90 leading-relaxed space-y-3" data-section="body">
                        <div class="customer-note px-1 relative"><p class="line-clamp-2 customer-text-content font-medium"></p><button onclick="openCardEditModal('${id}')" class="text-[11px] font-bold text-rose-500 mt-1.5 flex items-center gap-1">Sửa ghi chú</button></div>
                        <div class="doctor-reply hidden bg-indigo-50/30 border-l-4 border-indigo-400 p-3 rounded-r-2xl mt-2 relative">
                            <div class="flex items-center gap-2 mb-1.5"><span class="text-[11px] font-black text-indigo-600 doctor-reply-date not-italic">--.--</span><span class="text-[11px] font-black text-indigo-600">Bác sĩ phản hồi:</span></div>
                            <div class="doctor-text-container"><p class="text-[12.5px] doctor-text line-clamp-2 mb-2 whitespace-pre-line"></p><div class="flex items-center gap-2"><button onclick="openDoctorModal('${id}')" class="px-2 py-1 rounded-lg bg-white border border-indigo-200 text-indigo-600 font-bold text-[10px]">Sửa</button><button onclick="notifyCustomer('${id}')" id="notify-btn-${id}" class="btn-notify px-2 py-1 rounded-lg bg-rose-500 text-white font-black text-[10px]">Báo khách</button></div></div>

                    </div>
                    <div class="mt-4 pt-4 border-t border-pastel-border/60" data-section="footer">
                        <div class="flex items-center justify-between gap-3 overflow-x-auto no-scrollbar pb-1">
                            <div class="flex items-center gap-3 whitespace-nowrap shrink-0">
                                <div class="date-row flex items-center gap-3 text-[12.5px] font-black">
                                    <div class="flex items-center gap-1 text-pastel-subtext"><i class="ph ph-play-circle text-sm"></i><span class="ml-0.5">Bắt đầu</span> <span class="start-date font-black">${getTodayFormatted()}</span></div>
                                    <div class="flex items-center gap-1 text-rose-500"><i class="ph ph-magnifying-glass text-sm"></i><span class="ml-0.5">Ngày dò</span> <span class="do-date font-black"></span></div>
                                </div>
                                <div class="flex gap-1.5 items-center tags-container" id="tags-${id}"></div>
                                <button onclick="openTagModal('${id}')" class="w-7 h-7 rounded-full bg-pastel-bg text-pastel-subtext flex items-center justify-center border border-pastel-border shrink-0"><i class="ph ph-pencil-simple text-sm"></i></button>
                            </div>
                            <div class="flex items-center gap-1.5 shrink-0 quick-actions"></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById(`container-${tabId}`).insertAdjacentHTML('afterbegin', cardHTML);
            const card = document.getElementById(id);
            updateActionButtons(card, tabId);
            addCardLog(id, `Tạo thẻ mới`);
            initTruncation();
            sortCardsInContainer(`container-${tabId}`);
            setTimeout(() => openCardEditModal(id), 100);
        }

        function updateActionButtons(card, tabId) {
            const actions = card.querySelector('.quick-actions');
            if(!actions) return;
            const id = card.id;
            let btns = '';
            if (tabId == 1) {
                btns += `<button onclick="quickMove('${id}', 2)" class="px-3 py-1.5 rounded-xl bg-cyan-50 text-cyan-600 font-bold text-[10px] border border-cyan-100">2. Gửi hàng</button>`;
                btns += `<button onclick="quickMove('${id}', 3)" class="px-2.5 py-1.5 rounded-xl bg-pastel-green/10 text-emerald-600 font-bold text-[10px] border border-pastel-green/20">3. Add/Dò</button>`;
            }
            if (tabId != 6 && tabId != 0) {
                btns += `<button onclick="quickMove('${id}', 6)" class="px-3 py-1.5 rounded-xl bg-rose-50 text-rose-500 font-bold text-[10px] border border-rose-100">6. Xong</button>`;
            }
            btns += `<button onclick="openCardHistoryModal('${id}')" class="text-[10px] font-bold text-pastel-subtext flex items-center gap-1 bg-pastel-bg px-2.5 py-1.5 rounded-xl border border-pastel-border/50"><i class="ph ph-clock-counter-clockwise"></i> Lịch sử</button>`;
            actions.innerHTML = btns;
        }

        function handleCancelEdit() {
            if (currentCardId === lastCreatedCardId) {
                const card = document.getElementById(currentCardId);
                if (card && card.querySelector('.customer-name').innerText === "MỚI") card.remove();
            }
            closeModal('card-edit-modal');
            lastCreatedCardId = null;
        }

        function quickMove(cardId, targetTabId) {
            const card = document.getElementById(cardId);
            const targetContainer = document.getElementById(`container-${targetTabId}`);
            if (!card || !targetContainer) return;
            targetContainer.appendChild(card);
            updateActionButtons(card, targetTabId);
            if ([2, 3, 6].includes(targetTabId)) addCardLog(cardId, `Ấn nút ${tabNames[targetTabId]}`);
            // Nếu chuyển sang Xong: ghi ngày xong + thu gọn thẻ
            if (targetTabId === 6) {
                setCardDoneDate(card);
                collapseCardForDone(card);
            } else {
                expandCardFromDone(card); // Nếu chuyển ra khỏi Xong thì mở lại
            }
            sortCardsInContainer(`container-${targetTabId}`);
            updateReminders();
            updateCardNumbers();
            saveData();
        }

        function setCardDoneDate(card) {
            let doneDateEl = card.querySelector('.done-date');
            if (!doneDateEl) {
                const doDateRow = card.querySelector('.do-date').parentElement;
                const span = document.createElement('div');
                span.className = 'flex items-center gap-1 text-emerald-600';
                span.innerHTML = `<i class="ph ph-check-circle text-sm"></i><span class="ml-0.5">Xong</span> <span class="done-date font-black">${getTodayFormatted()}</span>`;
                doDateRow.appendChild(span);
            } else {
                doneDateEl.innerText = getTodayFormatted();
            }
        }

        function _getCardSections(card) {
            return {
                body     : card.querySelector('[data-section="body"]'),
                footer   : card.querySelector('[data-section="footer"]'),
                doctorBtn: card.querySelector('.btn-doctor-reply'),
                editBtn  : card.querySelector('.btn-edit-card')
            };
        }

        function collapseCardForDone(card) {
            card.dataset.collapsed = 'true';
            const { body, footer, doctorBtn, editBtn } = _getCardSections(card);
            if (body) body.classList.add('hidden');
            if (footer) footer.classList.add('hidden');
            if (doctorBtn) doctorBtn.classList.add('hidden');
            if (editBtn) editBtn.classList.add('hidden');

            // Tóm tắt ngày trên cùng dòng header
            if (!card.querySelector('.done-summary')) {
                const startDate = card.querySelector('.start-date')?.innerText || '';
                const doDate    = card.querySelector('.do-date')?.innerText || '';
                const doneDate  = card.querySelector('.done-date')?.innerText || '';
                const summary = document.createElement('div');
                summary.className = 'done-summary flex items-center gap-2 text-[10.5px] font-black flex-wrap mt-1';
                summary.innerHTML =
                    `<span class="flex items-center gap-0.5 text-pastel-subtext"><i class="ph ph-play-circle"></i> Bắt đầu <b>${startDate}</b></span>` +
                    (doDate   ? `<span class="text-pastel-subtext">·</span><span class="flex items-center gap-0.5 text-rose-400"><i class="ph ph-magnifying-glass"></i> Ngày dò <b>${doDate}</b></span>` : '') +
                    (doneDate ? `<span class="text-pastel-subtext">·</span><span class="flex items-center gap-0.5 text-emerald-600"><i class="ph ph-check-circle"></i> Xong <b>${doneDate}</b></span>` : '');
                // Chèn vào dưới dòng tên (trong card-header)
                const header = card.querySelector('.card-header');
                if (header) header.insertAdjacentElement('afterend', summary);
                else card.insertAdjacentElement('afterbegin', summary);
            }

            // Nút Mở/Đóng — thêm vào .card-btns
            if (!card.querySelector('.btn-toggle-done')) {
                const btn = document.createElement('button');
                btn.className = 'btn-toggle-done text-[10px] font-black text-emerald-600 bg-emerald-50 px-2.5 py-1.5 rounded-full border border-emerald-200';
                btn.innerText = 'Mở';
                btn.onclick = () => toggleDoneCard(card);
                const cardBtns = card.querySelector('.card-btns');
                if (cardBtns) cardBtns.appendChild(btn);
            }
        }

        function expandCardFromDone(card) {
            card.dataset.collapsed = 'false';
            const { body, footer, doctorBtn, editBtn } = _getCardSections(card);
            if (body) body.classList.remove('hidden');
            if (footer) footer.classList.remove('hidden');
            if (doctorBtn) doctorBtn.classList.remove('hidden');
            if (editBtn) editBtn.classList.remove('hidden');
            card.querySelector('.btn-toggle-done')?.remove();
            card.querySelector('.done-summary')?.remove();
        }

        function toggleDoneCard(card) {
            const isCollapsed = card.dataset.collapsed === 'true';
            const { body, footer, doctorBtn, editBtn } = _getCardSections(card);
            const btn     = card.querySelector('.btn-toggle-done');
            const summary = card.querySelector('.done-summary');
            if (isCollapsed) {
                if (body)     body.classList.remove('hidden');
                if (footer)   footer.classList.remove('hidden');
                if (doctorBtn) doctorBtn.classList.remove('hidden');
                if (editBtn)  editBtn.classList.remove('hidden');
                if (summary)  summary.classList.add('hidden');
                if (btn) btn.innerText = 'Đóng';
                card.dataset.collapsed = 'false';
            } else {
                if (body)     body.classList.add('hidden');
                if (footer)   footer.classList.add('hidden');
                if (doctorBtn) doctorBtn.classList.add('hidden');
                if (editBtn)  editBtn.classList.add('hidden');
                if (summary)  summary.classList.remove('hidden');
                if (btn) btn.innerText = 'Mở';
                card.dataset.collapsed = 'true';
            }
        }

        function openCardEditModal(cardId) {
            currentCardId = cardId;
            const card = document.getElementById(cardId);
            const currentName = card.querySelector('.customer-name').innerText;
            document.getElementById('edit-card-name').value = (currentName === "MỚI") ? "" : currentName;
            // Dùng getAttribute data hoặc textContent để giữ đúng xuống dòng
            const noteEl = card.querySelector('.customer-text-content');
            document.getElementById('edit-card-note').value = noteEl ? noteEl.dataset.raw || noteEl.innerText : '';
            document.getElementById('edit-card-do-date').value = card.querySelector('.do-date').innerText;
            document.getElementById('card-edit-modal').classList.add('open');
        }

        function saveCardDetails() {
            const card = document.getElementById(currentCardId);
            const newDate = document.getElementById('edit-card-do-date').value.trim();
            if (!validateDateInput(newDate)) return;
            const noteRaw = document.getElementById('edit-card-note').value;
            card.querySelector('.customer-name').innerText = document.getElementById('edit-card-name').value.trim() || "MỚI";
            const noteEl = card.querySelector('.customer-text-content');
            noteEl.dataset.raw = noteRaw;           // lưu raw để mở lại không mất xuống dòng
            noteEl.style.whiteSpace = 'pre-line';   // hiển thị đúng xuống dòng
            noteEl.innerText = noteRaw;
            card.querySelector('.do-date').innerText = newDate;
            closeModal('card-edit-modal');
            lastCreatedCardId = null;
            initTruncation();
            sortCardsInContainer(card.parentElement.id);
            updateReminders();
            updateCardNumbers();
            saveData();
        }

        function deleteCard() {
            if (confirm("Xóa thẻ này?")) {
                document.getElementById(currentCardId).remove();
                closeModal('card-edit-modal');
                updateReminders();
                updateCardNumbers();
                saveData();
            }
        }

        function openTagManagementModal() {
            const list = document.getElementById('tag-list-by-column');
            list.innerHTML = '';
            for (let id in tabNames) {
                const tags = tagsConfig[id] || [];
                const tagsHTML = tags.map(t => {
                    const col = getTagColor(t.text);
                    return `<span class="${col.bg} ${col.text} border ${col.border} px-2 py-0.5 rounded-full text-[9px] font-black">${t.text}</span>`;
                }).join('') || '<span class="text-[9px] italic text-pastel-subtext">Chưa có tag</span>';
                list.innerHTML += `
                    <div class="p-3 bg-pastel-bg rounded-2xl border border-pastel-border">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[11px] font-black text-indigo-600">${tabNames[id]}</span>
                            <button onclick="openEditTabTagsModal(${id})" class="text-[9px] font-black text-indigo-600 bg-indigo-50 border border-indigo-200 px-2 py-1 rounded-lg active:scale-95 transition-all">Sửa tag</button>
                        </div>
                        <div class="flex flex-wrap gap-1.5">${tagsHTML}</div>
                    </div>`;
            }
            document.getElementById('tag-management-modal').classList.add('open');
        }

        let editingTabId = null;

        function openEditTabTagsModal(tabId) {
            editingTabId = tabId;
            document.getElementById('edit-tab-tags-name').innerText = tabNames[tabId];
            renderEditTabTags();
            closeModal('tag-management-modal');
            document.getElementById('edit-tab-tags-modal').classList.add('open');
        }

        function renderEditTabTags() {
            const allTags = new Set();
            Object.values(tagsConfig).forEach(tags => tags.forEach(t => allTags.add(t.text)));
            const activeTags = (tagsConfig[editingTabId] || []).map(t => t.text);
            const list = document.getElementById('edit-tab-tags-list');
            if (allTags.size === 0) {
                list.innerHTML = '<p class="text-[11px] italic text-pastel-subtext py-4 w-full text-center">Chưa có tag nào. Bấm "+ Tạo tag mới"</p>';
                return;
            }
            list.innerHTML = Array.from(allTags).map(tagText => {
                const col = getTagColor(tagText);
                const isActive = activeTags.includes(tagText);
                const activeClass = isActive
                    ? `${col.bg} ${col.text} border-2 ${col.border} shadow-sm`
                    : 'bg-white text-pastel-subtext border border-pastel-border opacity-50';
                return `<button
                    onclick="toggleTagInTab('${tagText}')"
                    oncontextmenu="deleteTagGlobal('${tagText}', event)"
                    class="tag-edit-btn px-3 py-1.5 rounded-full text-[10px] font-black transition-all active:scale-95 ${activeClass}"
                    data-tag="${tagText}" data-active="${isActive}">${tagText}</button>`;
            }).join('');
        }

        function toggleTagInTab(tagText) {
            if (!tagsConfig[editingTabId]) tagsConfig[editingTabId] = [];
            const idx = tagsConfig[editingTabId].findIndex(t => t.text === tagText);
            if (idx >= 0) {
                tagsConfig[editingTabId].splice(idx, 1); // bỏ khỏi khung
            } else {
                tagsConfig[editingTabId].push({ text: tagText, color: 'auto' }); // thêm vào khung
            }
            renderEditTabTags();
            saveData();
        }

        function deleteTagGlobal(tagText, e) {
            e.preventDefault();
            if (!confirm(`Xoá tag "${tagText}" khỏi toàn bộ hệ thống?`)) return;
            // Xoá khỏi tagsConfig tất cả khung
            Object.keys(tagsConfig).forEach(id => {
                tagsConfig[id] = (tagsConfig[id] || []).filter(t => t.text !== tagText);
            });
            // Xoá khỏi tất cả thẻ đang hiển thị
            document.querySelectorAll(`.tag-badge[data-tag="${tagText}"]`).forEach(el => el.remove());
            renderEditTabTags();
            saveData();
        }

        function openCreateTagModalFromEdit() {
            const savedTabId = editingTabId;
            closeModal('edit-tab-tags-modal');
            document.getElementById('new-tag-name').value = '';
            const tabsEl = document.getElementById('new-tag-tabs');
            tabsEl.innerHTML = Object.entries(tabNames).map(([id, name]) =>
                `<label class="flex items-center gap-2 p-2 rounded-xl border border-pastel-border bg-pastel-bg cursor-pointer has-[:checked]:border-indigo-400 has-[:checked]:bg-indigo-50 transition-all">
                    <input type="checkbox" value="${id}" class="new-tag-tab-check accent-indigo-500" ${id == savedTabId ? 'checked' : ''}>
                    <span class="text-[11px] font-bold text-pastel-text">${name}</span>
                </label>`
            ).join('');
            document.getElementById('create-tag-modal').classList.add('open');
        }

        function openDoctorModal(cardId) {
            currentCardId = cardId;
            const docText = document.querySelector(`#${cardId} .doctor-text`);
            document.getElementById('doctor-input').value = docText ? (docText.dataset.raw || docText.innerText) : "";
            document.getElementById('doctor-modal').classList.add('open');
        }

        function saveDoctorReply() {
            const note = document.getElementById('doctor-input').value.trim();
            const card = document.getElementById(currentCardId);
            const replySection = card.querySelector('.doctor-reply');
            const doctorBtn = document.getElementById(`doctor-btn-${currentCardId}`);
            if (note) {
                const dtEl = card.querySelector('.doctor-text');
                dtEl.dataset.raw = note;
                dtEl.style.whiteSpace = 'pre-line';
                dtEl.innerText = note;
                card.querySelector('.doctor-reply-date').innerText = getTodayFormatted();
                replySection.classList.remove('hidden');
                // Làm mờ nút Bác sĩ phản hồi khi đã có nội dung
                if (doctorBtn) {
                    doctorBtn.classList.add('opacity-40');
                    doctorBtn.title = 'Đã có phản hồi - bấm để sửa';
                }
                addCardLog(currentCardId, 'Bác sĩ phản hồi');
            } else {
                replySection.classList.add('hidden');
                // Bỏ mờ khi xoá nội dung
                if (doctorBtn) {
                    doctorBtn.classList.remove('opacity-40');
                    doctorBtn.title = '';
                }
            }
            closeModal('doctor-modal');
            saveData();
        }

        function notifyCustomer(cardId) {
            const realId = cardId.replace('remind-', '');
            // Làm mờ nút Báo khách
            const notifyBtns = document.querySelectorAll(`[id$="notify-btn-${realId}"]`);
            notifyBtns.forEach(b => {
                b.disabled = true;
                b.classList.remove('bg-rose-500','text-white','font-black');
                b.classList.add('bg-pastel-bg','text-pastel-subtext','font-medium','opacity-50');
            });
            // Thêm nút "Đã báo" vào cạnh nút Sửa (trong doctor-text-container)
            const card = document.getElementById(realId);
            if (card) {
                const btnRow = card.querySelector('.doctor-text-container .flex');
                if (btnRow && !btnRow.querySelector('.da-bao-btn')) {
                    const daBao = document.createElement('span');
                    daBao.className = "da-bao-btn bg-green-50 text-emerald-600 border border-green-200 px-2 py-1 rounded-lg font-bold text-[10px]";
                    daBao.innerText = `Đã báo: ${getTimeFormatted()}`;
                    // Chèn vào giữa nút Sửa và nút Báo khách
                    const notifyBtn = btnRow.querySelector('.btn-notify');
                    btnRow.insertBefore(daBao, notifyBtn);
                }
            }
            addCardLog(realId, 'Báo khách');
            saveData();
        }

        function openCardHistoryModal(cardId) {
            const card = document.getElementById(cardId);
            document.getElementById('history-card-owner').innerText = card.querySelector('.customer-name').innerText;
            const content = document.getElementById('card-history-content');
            const logs = cardLogs[cardId] || [];
            content.innerHTML = logs.map(l => `<div class="p-3 bg-pastel-bg rounded-xl border border-pastel-border/50 text-[11px] font-medium">${l}</div>`).join('') || '<p class="text-center italic text-pastel-subtext text-[11px] py-10">Chưa có lịch sử</p>';
            document.getElementById('card-history-modal').classList.add('open');
        }

        function performSearch() {
            const query = document.getElementById('header-search-input').value.toLowerCase().trim();
            const resultsBox = document.getElementById('search-results-box');
            if (!query) { resultsBox.classList.add('hidden'); return; }
            let results = [];
            // Tìm trong tất cả tab (kể cả tab đang ẩn)
            document.querySelectorAll('.card').forEach(card => {
                // Bỏ qua các thẻ nhắc nhở (clone) trong tab 0
                if (card.id.startsWith('remind-')) return;
                const nameEl = card.querySelector('.customer-name');
                if (!nameEl) return;
                const name = nameEl.innerText.toLowerCase();
                if (name.includes(query)) results.push({ id: card.id, name: nameEl.innerText });
            });
            resultsBox.classList.toggle('hidden', results.length === 0);
            resultsBox.innerHTML = results.map(r => `<div onclick="goToCustomer('${r.id}')" class="p-3 border-b text-[11px] font-bold uppercase active:bg-pastel-bg">${r.name}</div>`).join('');
        }

        function goToCustomer(id) {
            document.getElementById('search-results-box').classList.add('hidden');
            document.getElementById('header-search-input').value = '';
            const card = document.getElementById(id);
            if (!card) return;
            // Tìm tab chứa card này
            const col = card.closest('.column-content');
            if (col) {
                const tabId = parseInt(col.id.replace('container-', ''));
                if (tabId && tabId !== currentActiveTab) switchTab(tabId);
            }
            setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        function updateReminders() {
            const container = document.getElementById('container-0');
            container.innerHTML = '';
            const todayStr = getTodayFormatted();
            let count = 0;
            document.querySelectorAll('.card').forEach(card => {
                if (card.id.startsWith('remind-')) return; // bỏ qua clone
                // Bỏ qua thẻ ở tab Xong (container-6)
                const col = card.closest('.column-content');
                if (col && col.id === 'container-6') return;
                const doDate = card.querySelector('.do-date').innerText;
                if (doDate === todayStr) {
                    const clone = card.cloneNode(true);
                    clone.id = `remind-${card.id}`;
                    container.appendChild(clone);
                    count++;
                }
            });
            if(count === 0) container.innerHTML = '<p class="text-center py-10 text-pastel-subtext italic text-sm">Hôm nay không có lịch nhắc</p>';
        }

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function initTruncation() {
            document.querySelectorAll('.line-clamp-2').forEach(p => {
                const btn = p.nextElementSibling;
                if (btn && btn.classList.contains('btn-view-more')) { btn.classList.toggle('hidden', p.scrollHeight <= p.clientHeight); }
            });
        }



        // Cập nhật số thứ tự thẻ trong mỗi tab
        function updateCardNumbers() {
            document.querySelectorAll('.column-content').forEach(col => {
                const cards = Array.from(col.querySelectorAll('.card:not([id^="remind-"])'));
                cards.forEach((card, idx) => {
                    const numEl = card.querySelector('.card-num');
                    if (numEl) numEl.innerText = idx + 1;
                });
            });
        }

        // ===== LƯU / KHÔI PHỤC DỮ LIỆU =====
        const DATA_KEY = 'htql_data_v1';

        // ===== HELPER: dựng object data từ DOM =====
        function collectData() {
            const cards = [];
            document.querySelectorAll('.card').forEach(card => {
                if (card.id.startsWith('remind-')) return;
                const col = card.closest('.column-content');
                const tabId = col ? parseInt(col.id.replace('container-', '')) : 1;
                const noteEl    = card.querySelector('.customer-text-content');
                const docEl     = card.querySelector('.doctor-text');
                const doneDateEl = card.querySelector('.done-date');
                cards.push({
                    id          : card.id,
                    tabId       : tabId,
                    name        : card.querySelector('.customer-name').innerText,
                    note        : noteEl ? (noteEl.dataset.raw || noteEl.innerText) : '',
                    doDate      : card.querySelector('.do-date').innerText,
                    startDate   : card.querySelector('.start-date').innerText,
                    doneDate    : doneDateEl ? doneDateEl.innerText : '',
                    collapsed   : card.dataset.collapsed === 'true',
                    doctorText  : docEl ? (docEl.dataset.raw || docEl.innerText) : '',
                    doctorDate  : card.querySelector('.doctor-reply-date')?.innerText || '',
                    doctorHidden: card.querySelector('.doctor-reply')?.classList.contains('hidden') ?? true,
                    notified    : !!card.querySelector('.da-bao-btn'),
                    notifiedTime: card.querySelector('.da-bao-btn')?.innerText || '',
                    tags        : Array.from(card.querySelectorAll('.tag-badge')).map(t => t.dataset.tag),
                    logs        : cardLogs[card.id] || []
                });
            });
            return { cards, tagsConfig };
        }

        // ===== HELPER: render data vào DOM =====
        function renderData(data) {
            if (!data) return;
            const { cards, tagsConfig: savedTags } = data;
            if (savedTags) Object.assign(tagsConfig, savedTags);
            (cards || []).forEach(d => {
                const container = document.getElementById(`container-${d.tabId}`);
                if (!container) return;
                const div = document.createElement('div');
                div.innerHTML = buildCardHTML(d);
                const card = div.firstElementChild;
                container.appendChild(card);
                cardLogs[d.id] = d.logs || [];
                // Ghi chú
                const noteEl = card.querySelector('.customer-text-content');
                if (noteEl && d.note) { noteEl.dataset.raw = d.note; noteEl.style.whiteSpace = 'pre-line'; noteEl.innerText = d.note; }
                // Bác sĩ phản hồi
                if (d.doctorText) {
                    const dtEl = card.querySelector('.doctor-text');
                    const replySection = card.querySelector('.doctor-reply');
                    if (dtEl) { dtEl.dataset.raw = d.doctorText; dtEl.style.whiteSpace = 'pre-line'; dtEl.innerText = d.doctorText; }
                    if (!d.doctorHidden && replySection) replySection.classList.remove('hidden');
                    const doctorBtn = card.querySelector('.btn-doctor-reply');
                    if (doctorBtn && !d.doctorHidden) doctorBtn.classList.add('opacity-40');
                    if (d.doctorDate) card.querySelector('.doctor-reply-date').innerText = d.doctorDate;
                }
                // Tags
                const tagsContainer = card.querySelector('.tags-container');
                (d.tags || []).forEach(tagText => {
                    const col = getTagColor(tagText);
                    const badge = document.createElement('span');
                    badge.className = `tag-badge ${col.bg} ${col.text} border ${col.border} px-2 py-0.5 rounded-full text-[9px] font-black`;
                    badge.dataset.tag = tagText;
                    badge.innerText = tagText;
                    tagsContainer.appendChild(badge);
                });
                // Đã báo
                if (d.notified && d.notifiedTime) {
                    const btnRow = card.querySelector('.doctor-text-container .flex');
                    if (btnRow) {
                        const daBao = document.createElement('span');
                        daBao.className = 'da-bao-btn bg-green-50 text-emerald-600 border border-green-200 px-2 py-1 rounded-lg font-bold text-[10px]';
                        daBao.innerText = d.notifiedTime;
                        const notifyBtn = btnRow.querySelector('.btn-notify');
                        if (notifyBtn) {
                            btnRow.insertBefore(daBao, notifyBtn);
                            notifyBtn.disabled = true;
                            notifyBtn.classList.remove('bg-rose-500','text-white','font-black');
                            notifyBtn.classList.add('bg-pastel-bg','text-pastel-subtext','font-medium','opacity-50');
                        }
                    }
                }
                // Tab Xong
                if (d.tabId === 6) {
                    if (d.doneDate) setCardDoneDate(card);
                    collapseCardForDone(card);
                    if (!d.collapsed) toggleDoneCard(card);
                }
                updateActionButtons(card, d.tabId);
            });
            initTruncation();
            updateReminders();
        }

        // ===== INDICATOR TRẠNG THÁI LƯU =====
        let _saveTimer = null;
        window._fsSaveStatus = (status) => {
            const el  = document.getElementById('save-indicator');
            const ico = document.getElementById('save-icon');
            const txt = document.getElementById('save-text');
            if (!el) return;
            el.style.removeProperty('display');
            clearTimeout(_saveTimer);
            if (status === 'saving') {
                el.className = 'flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded-lg bg-amber-50 text-amber-600 border border-amber-200';
                ico.className = 'ph ph-cloud-arrow-up text-sm';
                txt.innerText = 'Đang lưu...';
            } else if (status === 'saved') {
                el.className = 'flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded-lg bg-emerald-50 text-emerald-600 border border-emerald-200';
                ico.className = 'ph ph-cloud-check text-sm';
                txt.innerText = 'Đã lưu';
                _saveTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
            } else if (status === 'error') {
                el.className = 'flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded-lg bg-rose-50 text-rose-500 border border-rose-200';
                ico.className = 'ph ph-cloud-slash text-sm';
                txt.innerText = 'Lỗi lưu';
            } else if (status === 'offline') {
                el.className = 'flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded-lg bg-slate-50 text-slate-500 border border-slate-200';
                ico.className = 'ph ph-cloud-x text-sm';
                txt.innerText = 'Offline';
                _saveTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
            }
        };

        // ===== LƯU: localStorage ngay + Firestore async =====
        async function saveData() {
            const username = localStorage.getItem(USER_KEY);
            const data = collectData();
            // Lưu localStorage ngay (backup nhanh, không chờ)
            try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch(e) {}
            // Lưu Firestore theo user
            if (window._fsSave) {
                const ok = await window._fsSave(data, username);
                if (!ok) window._fsSaveStatus('offline');
            }
        }

        // ===== ĐỌC: Firestore trước, fallback localStorage =====
        async function loadData() {
            const username = localStorage.getItem(USER_KEY);
            let data = null;
            if (window._fsLoad && username) {
                data = await window._fsLoad(username);
            }
            if (!data) {
                try {
                    const raw = localStorage.getItem(DATA_KEY);
                    if (raw) data = JSON.parse(raw);
                } catch(e) {}
            }
            renderData(data);
        }

        function buildCardHTML(d) {
            return `<div class="card bg-white rounded-[32px] p-5 shadow-sm border border-pastel-border relative" id="${d.id}">
                <div class="card-header flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <span class="card-num w-5 h-5 rounded-full bg-rose-100 text-rose-500 text-[9px] font-black flex items-center justify-center shrink-0">?</span>
                        <div class="w-9 h-9 rounded-full bg-pastel-pink/10 flex items-center justify-center shrink-0"><i class="ph-fill ph-user text-pastel-pink text-lg"></i></div>
                        <span class="font-bold text-[15px] uppercase tracking-wide customer-name truncate max-w-[120px]">${d.name || 'MỚI'}</span>
                    </div>
                    <div class="card-btns flex items-center gap-1.5">
                        <button onclick="openCardEditModal('${d.id}')" class="btn-edit-card text-[10px] font-black text-pastel-subtext bg-pastel-bg px-2.5 py-1.5 rounded-full border border-pastel-border">Sửa thẻ</button>
                        <button onclick="openDoctorModal('${d.id}')" id="doctor-btn-${d.id}" class="btn-doctor-reply text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full flex items-center gap-1 border border-indigo-100">Bác sĩ phản hồi</button>
                    </div>
                </div>
                <div class="text-[13.5px] text-pastel-text/90 leading-relaxed space-y-3" data-section="body">
                    <div class="customer-note px-1 relative"><p class="line-clamp-2 customer-text-content font-medium"></p><button onclick="openCardEditModal('${d.id}')" class="text-[11px] font-bold text-rose-500 mt-1.5 flex items-center gap-1">Sửa ghi chú</button></div>
                    <div class="doctor-reply hidden bg-indigo-50/30 border-l-4 border-indigo-400 p-3 rounded-r-2xl mt-2 relative">
                        <div class="flex items-center gap-2 mb-1.5"><span class="text-[11px] font-black text-indigo-600 doctor-reply-date not-italic">--.--</span><span class="text-[11px] font-black text-indigo-600">Bác sĩ phản hồi:</span></div>
                        <div class="doctor-text-container"><p class="text-[12.5px] doctor-text line-clamp-2 mb-2 whitespace-pre-line"></p><div class="flex items-center gap-2"><button onclick="openDoctorModal('${d.id}')" class="px-2 py-1 rounded-lg bg-white border border-indigo-200 text-indigo-600 font-bold text-[10px]">Sửa</button><button onclick="notifyCustomer('${d.id}')" id="notify-btn-${d.id}" class="btn-notify px-2 py-1 rounded-lg bg-rose-500 text-white font-black text-[10px]">Báo khách</button></div></div>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-pastel-border/60" data-section="footer">
                    <div class="flex items-center justify-between gap-3 overflow-x-auto no-scrollbar pb-1">
                        <div class="flex items-center gap-3 whitespace-nowrap shrink-0">
                            <div class="date-row flex items-center gap-3 text-[12.5px] font-black">
                                <div class="flex items-center gap-1 text-pastel-subtext"><i class="ph ph-play-circle text-sm"></i><span class="ml-0.5">Bắt đầu</span> <span class="start-date font-black">${d.startDate || ''}</span></div>
                                <div class="flex items-center gap-1 text-rose-500"><i class="ph ph-magnifying-glass text-sm"></i><span class="ml-0.5">Ngày dò</span> <span class="do-date font-black">${d.doDate || ''}</span></div>
                            </div>
                            <div class="flex gap-1.5 items-center tags-container" id="tags-${d.id}"></div>
                            <button onclick="openTagModal('${d.id}')" class="w-7 h-7 rounded-full bg-pastel-bg text-pastel-subtext flex items-center justify-center border border-pastel-border shrink-0"><i class="ph ph-pencil-simple text-sm"></i></button>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0 quick-actions"></div>
                    </div>
                </div>
            </div>`;
        }

        // TỰ ĐỘNG GÁN SỰ KIỆN ENTER CHO Ô ĐĂNG NHẬP + KIỂM TRA PHIÊN
        window.onload = async () => {
            const loginScreen = document.getElementById('main-app').classList.add('hidden');

            const handleEnter = (e) => { if (e.key === 'Enter') handleLogin(); };
            document.getElementById('login-username').addEventListener('keypress', handleEnter);
            document.getElementById('login-password').addEventListener('keypress', handleEnter);

            // Nếu có token, ẩn cả 2 màn hình + verify ngầm để tránh lóe
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                document.getElementById('login-screen').style.display = 'none';
                const conPhien = await kiemTraPhien();
                if (conPhien) {
                    document.getElementById('main-app').classList.remove('hidden');
                    const hoTen = localStorage.getItem(USER_KEY);
                    const userLabel = document.getElementById('current-user-label');
                    if (userLabel && hoTen) userLabel.innerText = hoTen;
                    loadData();
                    initTruncation();
                    updateReminders();
                } else {
                    showLogin();
                }
            }
        };
    </script>

</body></html>
