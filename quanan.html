<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getAuth,
  signInAnonymously,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  doc,
  setDoc,
  deleteDoc,
  serverTimestamp,
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import {
  getStorage,
  ref as storageRef,
  uploadString,
  getDownloadURL,
  deleteObject,
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

(()=>{
const SEED_RAT=[{label:'Rất ngon',bc:'b3'},{label:'Cũng ngon',bc:'b2'},{label:'Ăn tạm được',bc:'b1'},{label:'Không quay lại',bc:'b0'}];
const SEED_REST=[
  {id:1,name:'Phở Gia Truyền Số 49',city:'hanoi',rating:0,address:'49 Bát Đàn, Hoàn Kiếm, Hà Nội',info:'Phở bò Hà Nội thứ thiệt.',open:'05:30',close:'10:30',img:'https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300&q=75'},
  {id:2,name:'Kem Bơ Đà Lạt Thanh Thảo',city:'dalat',rating:0,address:'45 Nguyễn Thị Minh Khai, Đà Lạt',info:'Kem bơ béo ngậy.',open:'09:00',close:'21:00',img:'https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=300&q=75'},
];
const CITIES={hanoi:'Hà Nội',hcm:'Hồ Chí Minh',hue:'Huế',danang:'Đà Nẵng',dalat:'Đà Lạt'};
const PER=5, KEY='qn_data', KEY_RAT='qn_ratings';
const D = {}; const $=id=>document.getElementById(id);
const state={view:'home',cities:new Set(),page:1,adminPage:1,searchQ:'',openNowMode:false,rests:[],_localRests:[],ratings:[],editingId:null,tempImg:'',loading:true};

// ===== Firestore sync (lưu quán ăn lên Firebase) =====
// Dùng Firebase Web SDK dạng <script type="module"> (modular SDK).
const firebaseConfig = {
  apiKey: "AIzaSyAdxkXOHp_L-8psfEgN3_2a4AL5LpyO3lA",
  authDomain: "tolamda.firebaseapp.com",
  projectId: "tolamda",
  storageBucket: "tolamda.firebasestorage.app",
  messagingSenderId: "905852529825",
  appId: "1:905852529825:web:e7207b8a19ef00889a94e0"
};
const FIRESTORE_COLLECTION = 'restaurants';
const fb = {
  enabled: false,
  ready: null,
  authReady: null,
  _authReadyResolve: null,
  app: null,
  auth: null,
  db: null,
  storage: null,
  user: null,
  loadedOnce: false
};
const AUTH_EMAIL_DOMAIN = '@app.local';
const ADMIN_EMAIL = 'thaild@app.local';

const isAdminUser = () => !!(fb.user && !fb.user.isAnonymous && fb.user.email === ADMIN_EMAIL);

const ensureAuthReady = async () => {
  try { if (fb.ready) await fb.ready; } catch (e) {}
  try { if (fb.authReady) await fb.authReady; } catch (e) {}
};

const initFirebase = () => {
  try {
    fb.app = initializeApp(firebaseConfig);
    fb.auth = getAuth(fb.app);
    fb.db = getFirestore(fb.app);
    fb.storage = getStorage(fb.app);
  } catch (e) {
    console.warn('[Firestore] Lỗi khởi tạo Firebase:', e);
    return Promise.resolve(null);
  }

  // Resolve khi onAuthStateChanged chạy lần đầu
  fb.authReady = new Promise((resolve) => { fb._authReadyResolve = resolve; });

  // Đăng nhập email/pass chỉ để bật quyền admin.
  // Dữ liệu danh sách quán có thể cho phép đọc công khai (public read) → không phụ thuộc đăng nhập.
  onAuthStateChanged(fb.auth, async (user) => {
    fb.user = user || null;
    fb.enabled = true; // app/firebase đã init; read có thể không cần auth
    updateAuthUI();

    if (fb._authReadyResolve) { fb._authReadyResolve(true); fb._authReadyResolve = null; }
  });

  return Promise.resolve(fb.db);
};

const fetchRestsFromFirestore = async () => {
  if (!fb.db) return null;
  try {
    // Tối ưu: chỉ lấy tối đa 500 quán (tránh tải quá nhiều)
    const snap = await getDocs(query(collection(fb.db, FIRESTORE_COLLECTION), limit(500)));
    const arr = [];
    snap.forEach(d => arr.push(d.data()));
    // sort phía client để không phụ thuộc index/orderBy
    arr.sort((a,b)=>(+b.id||0)-(+a.id||0));
    return arr;
  } catch (err) {
    console.warn('[Firestore] Lỗi khi tải dữ liệu:', err);
    return null;
  }
};

const loadRestsFromFirestore = async ({ silent = false } = {}) => {
  await ensureAuthReady();
  if (!fb.db) return null;
  // chống gọi lặp song song (giảm thời gian load và nhấp nháy)
  if (fb._loadPromise) return fb._loadPromise;

  state.loading = true;
  render();
  if (state.view === 'admin' || state.view === 'ratings') renderAdmin();

  fb._loadPromise = (async () => {
    try {
      const remote = await fetchRestsFromFirestore();
      if (remote !== null) {
        state.rests = remote;
        saveData();
      } else {
        state.rests = state._localRests || [];
        if (!silent) showSavedToast('Không tải được dữ liệu từ Firebase', true);
      }
      fb.loadedOnce = true;
      return remote;
    } finally {
      state.loading = false;
      render();
      if (state.view === 'admin' || state.view === 'ratings') renderAdmin();
      fb._loadPromise = null;
    }
  })();

  return fb._loadPromise;
};

const dataUrlToExt = (dataUrl) => {
  const m = /^data:([^;]+);/i.exec(dataUrl || '');
  const mime = (m?.[1] || '').toLowerCase();
  if (mime.includes('png')) return 'png';
  if (mime.includes('webp')) return 'webp';
  if (mime.includes('gif')) return 'gif';
  return 'jpg'; // jpeg/jpg mặc định
};

const uploadImageDataUrlToStorage = async ({ id, dataUrl, oldPath }) => {
  await ensureAuthReady();
  if (!fb.enabled || !fb.storage) throw new Error('Firebase chưa sẵn sàng');
  if (!isAdminUser()) throw new Error('Bạn cần đăng nhập admin để upload ảnh');
  const ext = dataUrlToExt(dataUrl);
  const path = `restaurants/${id}-${Date.now()}.${ext}`;
  const r = storageRef(fb.storage, path);
  await uploadString(r, dataUrl, 'data_url');
  const url = await getDownloadURL(r);
  // Dọn ảnh cũ nếu có (best-effort)
  if (oldPath && oldPath !== path) {
    try { await deleteObject(storageRef(fb.storage, oldPath)); } catch (e) {}
  }
  return { url, path };
};

const upsertRestToFirestore = async (r) => {
  await ensureAuthReady();
  if (!fb.enabled || !fb.db) { showSavedToast('Firebase chưa sẵn sàng, thử lại', true); return; }
  if (!isAdminUser()) {
    showSavedToast('Bạn cần đăng nhập admin để lưu lên Firebase', true);
    return;
  }
  try {
    const meta = {
      updatedAt: serverTimestamp(),
      updatedBy: fb.user?.email || fb.user?.uid || null,
    };
    if (!r.createdAt) {
      meta.createdAt = serverTimestamp();
      meta.createdBy = fb.user?.email || fb.user?.uid || null;
    }
    await setDoc(doc(fb.db, FIRESTORE_COLLECTION, String(r.id)), { ...r, ...meta }, { merge: true });
    showSavedToast('Đã lưu lên Firebase');
  } catch (err) {
    console.warn('[Firestore] Lỗi khi lưu quán:', err);
    const code = err?.code ? ` (${err.code})` : '';
    const msg = err?.message ? `: ${err.message}` : '';
    showSavedToast(`Lưu Firebase thất bại${code}${msg}`.slice(0, 160), true);
  }
};

const deleteRestFromFirestore = async (id, imgPath) => {
  await ensureAuthReady();
  if (!fb.enabled || !fb.db) { showSavedToast('Firebase chưa sẵn sàng, thử lại', true); return; }
  if (!isAdminUser()) {
    showSavedToast('Bạn cần đăng nhập admin để xoá trên Firebase', true);
    return;
  }
  try {
    await deleteDoc(doc(fb.db, FIRESTORE_COLLECTION, String(id)));
    // xoá ảnh trên Storage nếu có
    if (imgPath && fb.storage) {
      try { await deleteObject(storageRef(fb.storage, imgPath)); } catch (e) {}
    }
    showSavedToast('Đã xoá trên Firebase');
  } catch (err) {
    console.warn('[Firestore] Lỗi khi xoá quán:', err);
    const code = err?.code ? ` (${err.code})` : '';
    const msg = err?.message ? `: ${err.message}` : '';
    showSavedToast(`Xoá Firebase thất bại${code}${msg}`.slice(0, 160), true);
  }
};

const loadData=()=>{
  // Không hiển thị localStorage ngay lúc mở app để tránh “nhấp nháy”
  // (ví dụ: hiện dữ liệu cũ -> rỗng -> dữ liệu mới từ Firestore).
  // Chỉ dùng localStorage làm fallback nếu Firestore không tải được.
  state._localRests = JSON.parse(localStorage.getItem(KEY)) || [];
  state.rests = [];
  state.ratings = JSON.parse(localStorage.getItem(KEY_RAT)) || structuredClone(SEED_RAT);
};
const saveData=()=>{
    localStorage.setItem(KEY, JSON.stringify(state.rests));
    localStorage.setItem(KEY_RAT, JSON.stringify(state.ratings));

const renderPagination = (tid, len, cp, setFn) => {
    const total = Math.ceil(len / PER); const container = $(tid);
    if(total <= 1){ container.classList.remove('on'); return; }

    let h=''; for(let i=1;i<=total;i++) h+=`<button class="pn" ${i===cp?'aria-current="page"':''} data-page="${i}">${i}</button>`;
    container.innerHTML=h;

};

    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
  } finally {
    D.btnDownload.style.display = prev.btnDisplay;
    D.rList.innerHTML = prev.rList;
    D.adminList.innerHTML = prev.adminList;
    D.rEmpty.textContent = prev.rEmptyText;
    prev.rEmptyOn ? D.rEmpty.classList.add('on') : D.rEmpty.classList.remove('on');
    D.rEmptyAdmin.textContent = prev.rEmptyAdminText;
    prev.rEmptyAdminOn ? D.rEmptyAdmin.classList.add('on') : D.rEmptyAdmin.classList.remove('on');
  }
};

window.onload = () => {
    initD(); setupFilters('.shared-filters'); setupFilters('.shared-filters-admin');
    // Prefill email theo user bạn đã tạo (không lưu mật khẩu)
    try { if (D.lUser && !D.lUser.value) D.lUser.value = 'thaild'; } catch (e) {}

    $('navAccount').onclick=async ()=>{
      if (isAdminUser()) {
        try { await signOut(fb.auth); } catch (e) {}
        switchView('home');
      } else {
        switchView('login');
      }
    };

    $('btnDoLogin').onclick=async ()=>{
      const email=normalizeLogin(D.lUser.value);
      const pass=D.lPass.value;
      D.loginErr.classList.remove('on');
      if(!email || !pass){ D.loginErr.classList.add('on'); return; }
      try{
        await signInWithEmailAndPassword(fb.auth, email, pass);
        D.lPass.value='';
        switchView('home');
      }catch(err){
        console.warn('[Auth] Đăng nhập thất bại:', err);
        D.loginErr.classList.add('on');
        D.lPass.value='';
      }
    };
    D.lPass.onkeydown=e=>{if(e.key==='Enter')$('btnDoLogin').click()};
    $('btnAdmin').onclick=()=>switchView('admin'); $('btnNavHome').onclick=()=>switchView('home');
    $('btnBackHome').onclick=()=>switchView('home'); $('btnGoRatings').onclick=()=>switchView('ratings');
    $('btnBackAdmin').onclick=()=>switchView('admin');

    // Event delegation cho danh sách quản lý (tránh phụ thuộc inline onclick – đôi khi bị chặn bởi CSP)
    D.adminList.onclick = async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const act = btn.dataset.act;
      const id = +(btn.dataset.id || 0);
      if (!act || !id) return;
      if (act === 'edit') return window.app.edit(id);
      if (act === 'del') return window.app.del(id);
    };

    $('btnSaveRatings').onclick=()=>{ document.querySelectorAll('.rating-label-input').forEach(inp=>{state.ratings[+inp.dataset.index].label=inp.value.trim()||'Trống';}); saveData(); switchView('admin'); };
    document.querySelectorAll('.btnSearchTrigger').forEach(btn=>btn.onclick=()=>{D.searchOv.classList.add('on');setTimeout(()=>D.searchInp.focus(),100);});
    $('btnCloseSearch').onclick=()=>D.searchOv.classList.remove('on');
    D.searchInp.onkeydown=e=>{if(e.key==='Enter'){state.searchQ=D.searchInp.value.trim();D.searchOv.classList.remove('on');applyFilters();}};
    $('btnAddRest').onclick=()=>window.app.openForm(); $('btnCancelForm').onclick=()=>D.formOv.classList.remove('on');
    $('btnSaveForm').onclick=async ()=>{
      const btn = $('btnSaveForm');
      const prevText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Đang lưu...';
      const r={name:D.fName.value.trim()||'Quán chưa đặt tên',city:D.fCity.value,address:D.fAddress.value.trim(),open:D.fOpen.value,close:D.fClose.value,rating:+D.fRating.value,img:state.tempImg||'https://images.unsplash.com/photo-1555126634-323283e090fa?w=300',info:D.fInfo.value.trim()};
      let saved;
      if(state.editingId){
        const idx=state.rests.findIndex(x=>x.id===state.editingId);
        state.rests[idx]={...state.rests[idx],...r};
        saved = state.rests[idx];
      } else {
        r.id=Date.now();
        state.rests.unshift(r);
        saved = r;
      }
      try {
        // Upload ảnh lên Storage nếu ảnh là dataURL (từ upload file)
        if (typeof state.tempImg === 'string' && state.tempImg.startsWith('data:')) {
          const uploaded = await uploadImageDataUrlToStorage({ id: saved.id, dataUrl: state.tempImg, oldPath: saved.imgPath });
          saved.img = uploaded.url;
          saved.imgPath = uploaded.path;
          state.tempImg = uploaded.url; // để UI hiện URL
        }
        saveData();
        D.formOv.classList.remove('on');
        renderAdmin();
        await upsertRestToFirestore(saved);
      } catch (err) {
        console.warn('[Storage/Firestore] Lỗi khi lưu:', err);
        showSavedToast(`Lưu thất bại: ${err?.message || 'Unknown error'}`.slice(0, 160), true);
      } finally {
        btn.disabled = false;
        btn.textContent = prevText;
      }
    };
    $('btnUploadTrigger').onclick=()=>$('fileInput').click();
    $('fileInput').onchange=e=>{ const f=e.target.files[0]; if(f){const rd=new FileReader(); rd.onload=ev=>{state.tempImg=ev.target.result; D.fImgPreview.src=ev.target.result; D.fImgPreview.style.display='block'; D.uploadStatus.textContent='Thay đổi ảnh';}; rd.readAsDataURL(f);}};
    D.btnDownload.onclick=downloadApp; render(); updateFilterUI();

    // Khởi tạo Firebase/Auth/Firestore (tự sign-in ẩn danh để đọc dữ liệu)
    fb.ready = initFirebase();
    // Tải danh sách quán từ Firestore ngay khi mở app (không cần đăng nhập)
    loadRestsFromFirestore({ silent: true });
};

window.app = {
    edit: id => window.app.openForm(id),
    del: async (id) => {
      if(!confirm("Xoá quán này?")) return;
      const r = state.rests.find(x=>x.id===id);
      state.rests=state.rests.filter(x=>x.id!==id);
      saveData();
      renderAdmin();
      await deleteRestFromFirestore(id, r?.imgPath);
    },
    editRatLabel: i => { const inp=$(`rat-input-${i}`); inp.disabled=false; inp.focus(); inp.style.background='#fff'; },
    openForm: id => {
        state.editingId=id; state.tempImg=''; D.fRating.innerHTML=state.ratings.map((r,i)=>`<option value="${i}">${r.label}</option>`).join('');
        if(id){ const r=state.rests.find(x=>x.id===id); D.fName.value=r.name; D.fCity.value=r.city; D.fAddress.value=r.address; D.fOpen.value=r.open; D.fClose.value=r.close; D.fRating.value=r.rating; D.fInfo.value=r.info; state.tempImg=r.img; D.formTitle.textContent="Cập nhật quán"; }
        else { D.fName.value=''; D.fAddress.value=''; D.fOpen.value='08:00'; D.fClose.value='22:00'; D.fInfo.value=''; D.formTitle.textContent="Thêm quán mới"; }
        if(state.tempImg){D.fImgPreview.src=state.tempImg; D.fImgPreview.style.display='block'; D.uploadStatus.textContent='Thay đổi ảnh';} else {D.fImgPreview.style.display='none'; D.uploadStatus.textContent='Bấm để tải ảnh';}
        D.formOv.classList.add('on');
    }
};
})();
</script>

</body></html>
